root = "."
tmp_dir = ".air"

[build]
cmd = "go generate ./... && go build -o ./.air/mailaroo ./cmd/mailaroo"
full_bin = "./.air/mailaroo"
delay = 1000
exclude_dir = [
    "data",
    "node_modules",
    "static",
    "tmp",
    "db/migrations",
    "bin",
    ".air",
]
include_ext = ["go", "tpl", "tmpl", "html", "templ", "sql", "env"]
exclude_regex = ["_test.go", ".*_templ.go"]
kill_delay = "0s"
log = "build-errors.log"
stop_on_error = true

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
